<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>jsPsych Red Circle Experiment</title>
  <!-- jsPsych core library and CSS -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <style>
    /* 1. 背景色を灰色 (#808080) に設定 */
    body {
      background-color: #808080;
      color: white; /* 文字を見やすくするために白に設定 */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 2. 直径100pxの赤い円のスタイル */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: #ff0000;
      border-radius: 50%;
      margin: 0 auto;
    }
    
    .experiment-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
  </style>
</head>
<body>
  <div id="jspsych-target"></div>

  <script>
    /**
     * jsPsychの初期化
     */
    const jsPsych = initJsPsych({
      display_element: 'jspsych-target',
      on_finish: function() {
        // 実験終了時にデータをコンソールに表示
        jsPsych.data.displayData();
      }
    });

    // タイムラインの定義
    const timeline = [];

    /**
     * 2 & 3. 円の表示トライアル
     * html-keyboard-responseを使用し、スペースキーで反応
     */
    const circle_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="experiment-container">
          <div class="red-circle"></div>
          <p>スペースキーを押して終了してください</p>
        </div>
      `,
      choices: [' '], // スペースキーのみ受け付け
      data: {
        test_part: 'red_circle_display'
      }
    };
    timeline.push(circle_trial);

    /**
     * 4. 終了メッセージ
     */
    const goodbye = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="experiment-container">
          <p>実験が終了しました。ありがとうございました。</p>
        </div>
      `,
      choices: "NO_KEYS",
      duration: 3000
    };
    timeline.push(goodbye);

    /**
     * 実験の実行
     */
    jsPsych.run(timeline);
  </script>
</body>
</html>
